apply plugin: 'com.android.application'

// 16 KB page size (Google Play, apps targeting Android 15+):
// Forzar las deps de Google cuyas .so prebuilt no estaban alineadas a 16KB.
// useLegacyPackaging=false (packagingOptions) alinea las .so en el ZIP, pero
// la alineacion del segmento ELF de cada .so la traen estas versiones nuevas.
// - androidx.camera 1.4.0  -> libimage_processing_util_jni.so (lo pinea capacitor-mlkit a 1.1.0)
// - mlkit barcode-scanning 17.3.0 -> libbarhopper (default del plugin: 17.1.0)
// - mlkit face-detection 16.1.7
// Las versiones son drop-in (mismo API). Ver research 2026-06-11.
configurations.all {
    resolutionStrategy {
        force 'androidx.camera:camera-core:1.4.0'
        force 'androidx.camera:camera-camera2:1.4.0'
        force 'androidx.camera:camera-lifecycle:1.4.0'
        force 'androidx.camera:camera-view:1.4.0'
        force 'com.google.mlkit:barcode-scanning:17.3.0'
        force 'com.google.mlkit:face-detection:16.1.7'
    }
}

android {
    namespace "com.sistemasinformaticos.frc"
    compileSdkVersion rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.sistemasinformaticos.frc"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 8
        versionName "3.0.9"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            def ksPath = System.getenv("KEYSTORE_PATH")
            if (ksPath) {
                storeFile file(ksPath)
                storePassword System.getenv("KEYSTORE_PASSWORD")
                keyAlias System.getenv("KEY_ALIAS")
                keyPassword System.getenv("KEY_PASSWORD")
            }
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            def ksPath = System.getenv("KEYSTORE_PATH")
            if (ksPath) {
                signingConfig signingConfigs.release
            }
        }
    }
    packagingOptions {
        resources {
            excludes += 'META-INF/*.kotlin_module'
            excludes += 'META-INF/DEPENDENCIES'
            excludes += 'META-INF/LICENSE'
            excludes += 'META-INF/LICENSE.txt'
            excludes += 'META-INF/license.txt'
            excludes += 'META-INF/NOTICE'
            excludes += 'META-INF/NOTICE.txt'
            excludes += 'META-INF/notice.txt'
        }
        // Requerido para compatibilidad con páginas de memoria de 16 KB (Android 15+)
        jniLibs {
            useLegacyPackaging = false
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
    implementation platform('com.google.firebase:firebase-bom:33.1.2')
    implementation 'com.google.android.gms:play-services-location:21.3.0'
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}

