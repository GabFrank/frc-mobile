name: Deploy to Play Store

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (e.g. 3.1.0-alpha.1). Leave empty for latest.'
        required: false
        type: string
      track:
        description: 'Play Store track'
        required: true
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.track == 'production' && 'production' || inputs.track == 'beta' && 'beta' || 'alpha' }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TRACK="${{ inputs.track }}"
          OVERRIDE="${{ inputs.version }}"

          if [[ -n "${OVERRIDE}" ]]; then
            echo "Using manual version: ${OVERRIDE}"
            echo "version=${OVERRIDE}" >> $GITHUB_OUTPUT
          else
            echo "Resolving latest version for track: ${TRACK}"
            if [[ "${TRACK}" == "production" ]]; then
              TAG=$(curl -fsSL \
                -H "Authorization: token ${GH_TOKEN}" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/${{ github.repository }}/releases/latest" \
                | jq -r '.tag_name')
            elif [[ "${TRACK}" == "beta" ]]; then
              TAG=$(curl -fsSL \
                -H "Authorization: token ${GH_TOKEN}" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/${{ github.repository }}/releases" \
                | jq -r '[.[] | select(.prerelease == true and (.tag_name | contains("beta")))][0].tag_name')
            else
              TAG=$(curl -fsSL \
                -H "Authorization: token ${GH_TOKEN}" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/${{ github.repository }}/releases" \
                | jq -r '[.[] | select(.prerelease == true and (.tag_name | contains("alpha")))][0].tag_name')
            fi
            VERSION="${TAG#v}"
            echo "Resolved version: ${VERSION}"
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
          fi

      - name: Download AAB from GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.resolve.outputs.version }}
        run: |
          echo "Downloading AAB from release v${VERSION}..."
          ASSET_URL=$(curl -fsSL \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/v${VERSION}" \
            | jq -r '.assets[] | select(.name | endswith(".aab")) | .url')

          if [[ -z "${ASSET_URL}" || "${ASSET_URL}" == "null" ]]; then
            echo "::error::No AAB found in release v${VERSION}"
            exit 1
          fi

          curl -fSL \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/octet-stream" \
            -o app-release.aab \
            "${ASSET_URL}"
          ls -lh app-release.aab

      - name: Upload to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}
          packageName: com.sistemasinformaticos.frc
          releaseFiles: app-release.aab
          track: ${{ inputs.track }}
          status: completed

      - name: Summary
        if: always()
        env:
          VERSION: ${{ steps.resolve.outputs.version }}
        run: |
          echo "## Play Store Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "- **Track:** ${{ inputs.track }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Package:** com.sistemasinformaticos.frc" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
