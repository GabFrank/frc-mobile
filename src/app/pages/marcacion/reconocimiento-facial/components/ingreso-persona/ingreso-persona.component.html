<ion-list style="height: 100%; display: flex; flex-direction: column;">
  <div class="identification-container ingreso-persona">
    <div class="header-row header-banner">
      <ion-icon name="arrow-back" (click)="onBack()" class="back-icon"></ion-icon>
      <span class="header-title">Identificar empleado</span>
    </div>

    <ion-segment [value]="modo" (ionChange)="onModoChange($any($event).detail.value)" mode="ios">
      <ion-segment-button value="camara">
        <ion-label>Por cámara</ion-label>
      </ion-segment-button>
      <ion-segment-button value="id">
        <ion-label>Por ID</ion-label>
      </ion-segment-button>
    </ion-segment>

    <ng-container *ngIf="modo === 'id'">
      <div class="modo-id-content">
        <div class="icon-block">
          <ion-icon name="person-circle-outline"></ion-icon>
          <p>Introduzca el ID de persona del empleado</p>
        </div>

        <ion-item class="input-item">
          <ion-label position="floating">ID de Persona</ion-label>
          <ion-input type="number" [(ngModel)]="personaIdInput" placeholder="Ej: 12345" [disabled]="isLoading">
          </ion-input>
        </ion-item>

        <ion-button (click)="onSiguiente()" [disabled]="isLoading || !personaIdInput" expand="block" shape="round"
          size="large" class="btn-primary">
          CONTINUAR
          <ion-spinner *ngIf="isLoading" name="crescent"></ion-spinner>
        </ion-button>
      </div>
    </ng-container>

    <ng-container *ngIf="modo === 'camara'">
      <div class="modo-camara-content">
        <p class="search-hint">Búsqueda 1:N con caché del servidor (Human.js)</p>

        <div *ngIf="similarityPercent != null" class="similitud-panel">
          Similitud: {{ similarityPercent }}%
        </div>
        <p class="search-message">{{ searchMessage }}</p>

        <div class="camera-container">
          <video id="ingreso-camera-feed" autoplay playsinline muted class="camera-feed"></video>
          <div *ngIf="isLoading" class="loading-overlay">
            <ion-spinner name="crescent"></ion-spinner>
          </div>
        </div>
      </div>
    </ng-container>
  </div>
</ion-list>
