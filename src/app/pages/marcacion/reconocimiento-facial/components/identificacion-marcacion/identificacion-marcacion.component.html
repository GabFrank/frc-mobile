<ion-list style="height: 100%">
  <div class="identification-container">
    <div class="header-row">
      <ion-icon name="arrow-back" style="font-size: 1.5em; cursor: pointer;" (click)="onBack()"></ion-icon>
      <span class="header-title">
        {{ headerTitle }}
      </span>
    </div>

    <div style="text-align: center; margin-bottom: 5px;">
      <span style="font-size: 1.3em; font-weight: bold; color: var(--ion-color-dark);">
        {{ formattedTime }}
      </span>
    </div>

    <div *ngIf="usuarioIdentificado" style="text-align: center; margin-bottom: 10px; padding: 10px; background: linear-gradient(135deg, #28a745 0%, #218838 100%); color: white; border-radius: 8px;">
      <div style="font-size: 0.7em; opacity: 0.9;">IDENTIFICANDO A:</div>
      <div style="font-size: 1em; font-weight: bold;">{{ nombreUsuario }}</div>
    </div>

    <div *ngIf="esMarcacionTercero" class="aviso-tercero">
      Debe presentarse el rostro de <strong>{{ nombreUsuario }}</strong> (similitud mínima 75%).
    </div>

    <div class="similarity-indicator" *ngIf="similarityPercent !== null || verificationMessage">
      <div class="similarity-bar">
        <div class="similarity-fill" [style.width.%]="similarityPercent ?? 0" [class.similarity-success]="isVerified"
          [class.similarity-fail]="!isVerified">
        </div>
      </div>
      <div class="similarity-text" [class.text-success]="isVerified" [class.text-fail]="!isVerified && similarityPercent !== null">
        {{ verificationMessage }}
      </div>
    </div>

    <div class="camera-container">
      <video *ngIf="!snapshotUrl" id="camera-feed" autoplay playsinline muted class="camera-feed"></video>

      <img *ngIf="snapshotUrl" [src]="snapshotUrl" alt="Foto verificada" class="camera-snapshot" />
    </div>

    <ion-row style="margin-top: 4px;">
      <ion-col size="12" class="ion-text-center">
        <ion-button (click)="onMarcar()" [disabled]="isLoading || !isVerified" expand="block" shape="round" size="large"
          style="--background: linear-gradient(135deg, #28a745 0%, #218838 100%);">
          {{ 'MARCAR ' + tipoLabel }}
        </ion-button>
      </ion-col>
    </ion-row>
  </div>
</ion-list>
