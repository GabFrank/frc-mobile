<ion-list style="height: 100%">
  <div *ngIf="cantidadImagenes < 3">
    <div class="header-row">
      <ion-icon name="arrow-back" style="font-size: 1.5em; cursor: pointer;" (click)="onBack()"></ion-icon>
      <span class="header-title">Registro facial</span>
    </div>
    <ion-item style="text-align: center">
      <ion-label style="white-space: normal; font-size: large">Vemos que todavia no concluiste la etapa de registro
        facial.</ion-label>
    </ion-item>
    <ion-item style="text-align: center">
      <ion-label style="white-space: normal; font-size: large">Faltan {{ 3 - cantidadImagenes }} imagen(es)</ion-label>
    </ion-item>
    <ion-row>
      <ion-col size="12" class="ion-text-center">
        <ion-button (click)="onCargarImagen()" expand="block" fill="clear" shape="round">
          Cargar imagen
        </ion-button>
      </ion-col>
    </ion-row>

    <ion-grid fixed>
      <ion-row>
        <ion-col size="6" *ngFor="let image of userImageList; let i = index">
          <div style="position: relative; display: inline-block; width: 100%">
            <img [src]="image" alt="img" style="width: 100%; height: auto" />
            <ion-icon name="close" style="
                position: absolute;
                top: 0;
                right: 0;
                font-size: 25px;
                color: #f44336;
                cursor: pointer;
              " (click)="deleteImage(i)"></ion-icon>
          </div>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>

  <div *ngIf="cantidadImagenes >= 3" class="identification-container">
    <div class="header-row">
      <ion-icon name="arrow-back" style="font-size: 1.5em; cursor: pointer;" (click)="onBack()"></ion-icon>
      <span class="header-title">
        {{ snapshotUrl ? 'Identidad verificada' : 'Posicione su rostro' }}
      </span>
    </div>

    <div class="similarity-indicator" *ngIf="similarityPercent !== null">
      <div class="similarity-bar">
        <div class="similarity-fill" [style.width.%]="similarityPercent" [class.similarity-success]="isVerified"
          [class.similarity-fail]="!isVerified">
        </div>
      </div>
      <div class="similarity-text" [class.text-success]="isVerified" [class.text-fail]="!isVerified">
        {{ verificationMessage }}
      </div>
    </div>

    <div class="camera-container">
      <video *ngIf="!snapshotUrl" id="camera-feed" autoplay playsinline muted
        style="width: 100%; max-width: 400px; border-radius: 10px; transform: scaleX(-1);"></video>
      <img *ngIf="snapshotUrl" [src]="snapshotUrl" alt="Foto verificada"
        style="width: 100%; max-width: 400px; border-radius: 10px; transform: scaleX(-1);" />
      <div *ngIf="isLoading" class="loading-overlay">
        <ion-spinner name="crescent"></ion-spinner>
      </div>
    </div>

    <ion-row style="margin-top: 4px;">
      <ion-col size="12" class="ion-text-center">
        <ion-button (click)="onMarcar()" [disabled]="isLoading || !isVerified" expand="block" shape="round" size="large"
          color="success">
          {{isLoading ? 'Procesando...' : 'MARCAR ' + getTipoLabel()}}
        </ion-button>
      </ion-col>
    </ion-row>
  </div>
</ion-list>
