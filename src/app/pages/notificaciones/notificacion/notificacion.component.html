<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button aria-label="Filter notifications">
        <ion-icon slot="icon-only" name="funnel-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-buttons slot="end">
      <ion-button aria-label="More options">
        <ion-icon slot="icon-only" name="ellipsis-horizontal"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="header-container">
    <h1 class="title">Notificaciones</h1>
  </div>

  <ion-list lines="none" class="notification-list">
    <ion-item *ngFor="let notification of notifications; trackBy: trackById" class="notification-item">
      <div slot="start" [class]="'icon-container ' + notification.color">
        <ion-icon [name]="notification.icon + '-outline'"></ion-icon>
      </div>
      <ion-label>
        <h2>{{ notification.title }}</h2>
        <p>{{ notification.description }}</p>
        <span class="time">{{ notification.time }}</span>
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>
